<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Pai Pai Beauty</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fucsia: #FF1BA7;
            --grafito: #121212;
            --perla: #F8FAFC;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--perla);
            color: var(--grafito);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            box-sizing: border-box;
        }
        .logo-text {
            color: var(--fucsia);
            font-family: 'League Spartan', sans-serif;
            font-size: 2.5em;
            margin: 0 0 5px 0;
            letter-spacing: -1px;
        }
        .subtitulo {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        label {
            display: block;
            text-align: left;
            margin-top: 20px;
            font-weight: 600;
            font-size: 0.9em;
            color: var(--grafito);
        }
        select, input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: 1.5px solid #E2E8F0;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            background-color: var(--perla);
            font-size: 1em;
            transition: border-color 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--fucsia);
        }
        .btn {
            background-color: var(--fucsia);
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 1.1em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            transition: transform 0.2s, background-color 0.3s;
        }
        .btn:hover {
            background-color: #e01592;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        .hidden { display: none; }
        .loading { color: var(--fucsia); font-weight: 600; margin: 20px 0; }
        
        .pantalla-exito h2 { color: #2ecc71; font-family: 'League Spartan', sans-serif; font-size: 2em;}
        .pantalla-exito p { color: #555; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="logo-text">PAI PAI</h1>
    <p class="subtitulo">Reserva tu momento</p>

    <div id="cargandoHorarios" class="loading">Buscando lugares disponibles...</div>

    <!-- SISTEMA BLINDADO: El iframe oculto asegura que navegadores como Safari no bloqueen el envío -->
    <iframe name="iframe_oculto" id="iframe_oculto" class="hidden" onload="if(formularioEnviado){ mostrarExito(); }"></iframe>
    
    <form id="formularioReserva" method="POST" target="iframe_oculto" class="hidden" onsubmit="prepararEnvio()">
        
        <label for="turnoSeleccionado">1. ¿Cuándo vienes?</label>
        <select id="turnoSeleccionado" name="fila" required>
            <option value="">Selecciona fecha y hora</option>
        </select>

        <label for="nombre">2. Nombre y Apellido:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Caro Gómez" required>

        <label for="servicio">3. ¿Qué te vas a hacer?</label>
        <input type="text" id="servicio" name="servicio" placeholder="Ej: Soft Gel, Kapping..." required>

        <label for="telefono">4. Tu WhatsApp:</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ej: 3804123456" required>

        <button type="submit" class="btn" id="botonEnviar">Reservar mi lugar</button>
    </form>

    <div id="pantallaExito" class="pantalla-exito hidden">
        <h2>¡Cita Confirmada! 💕</h2>
        <p>Tu turno se agendó correctamente. ¡Te esperamos en el estudio para dejarte hermosa!</p>
        <button class="btn" onclick="location.reload()" style="background-color: var(--grafito);">Sacar otro turno</button>
    </div>
</div>

<script>
    // 👇 TU URL DE GOOGLE APPS SCRIPT YA ESTÁ INTEGRADA AQUÍ 👇
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwN7b8cXG0f8Z3FoMoaoX4SbfkcIguBVWTB4YL1sahHkmEAc16F_igdzeYRxZaBFkKeyw/exec"; 
    
    let formularioEnviado = false;

    document.getElementById("formularioReserva").action = URL_SCRIPT;

    document.addEventListener("DOMContentLoaded", () => {
        fetch(URL_SCRIPT)
            .then(respuesta => respuesta.json())
            .then(datos => {
                const cargando = document.getElementById("cargandoHorarios");
                const select = document.getElementById("turnoSeleccionado");
                const formulario = document.getElementById("formularioReserva");

                if (datos.length === 0) {
                    cargando.textContent = "Lo sentimos, no hay turnos disponibles por ahora.";
                } else {
                    cargando.classList.add("hidden");
                    formulario.classList.remove("hidden");
                    datos.forEach(turno => {
                        const opcion = document.createElement("option");
                        opcion.value = turno.fila;
                        opcion.textContent = `${turno.fecha} - ${turno.hora} hs`;
                        select.appendChild(opcion);
                    });
                }
            })
            .catch(error => {
                document.getElementById("cargandoHorarios").textContent = "Error al cargar la agenda. Por favor, actualiza la página.";
            });
    });

    function prepararEnvio() {
        formularioEnviado = true;
        const boton = document.getElementById("botonEnviar");
        boton.textContent = "Guardando turno...";
        boton.disabled = true;
    }

    function mostrarExito() {
        document.getElementById("formularioReserva").classList.add("hidden");
        document.getElementById("pantallaExito").classList.remove("hidden");
    }
</script>

</body>
</html>
